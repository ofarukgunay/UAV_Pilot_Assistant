# ==============================================================
# IHA Pilot Asistanı — Docker Compose
# ==============================================================
# Kullanım:
#   docker compose up --build
#   docker compose up -d         (arkaplanda)
#   docker compose down          (durdur)
# ==============================================================

version: "3.9"

services:
  iha-pilot:
    build: .
    container_name: iha-pilot-asistani
    ports:
      - "5000:5000"
    environment:
      # Ollama localhost'ta çalışıyorsa host.docker.internal kullan
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - OLLAMA_TIMEOUT=120
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
    volumes:
      # Log dosyaları host'ta kalır
      - ./logs:/app/logs
    restart: unless-stopped
    # Windows'ta host.docker.internal için
    extra_hosts:
      - "host.docker.internal:host-gateway"
